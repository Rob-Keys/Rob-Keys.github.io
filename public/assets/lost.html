<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Finding My Item!</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main:       #232D4B;
            --secondary:  #E57200;
            --accent1:    #C8CBD2;
            --accent2:    #F9DCBF;
            --accent3:    #434D6B;
            --container:  #E8EBF2;
            --font:       #030D2B;
        }

        body {
            font-family: Rockwell, 'Rockwell Nova', Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 40px;
            background: linear-gradient(
                135deg,
                var(--main),
                var(--secondary),
                var(--accent1),
                var(--accent2),
                var(--accent3),
                var(--main),
                var(--secondary),
                var(--accent1),
                var(--accent2),
                var(--accent3)
            );
            background-size: 400% 400%;
            animation: flowingGradient 24s linear infinite;
            color: var(--font);
        }

        @keyframes flowingGradient {
            0%   { background-position: 74% 74%; }
            100% { background-position: 0% 0%; }
        }

        /* ── Photo sits above the card ── */
        .photo-wrapper {
            position: relative;
            z-index: 2;
            margin-bottom: -56px;
            opacity: 0;
            transform: translateY(-24px) scale(0.88);
            animation: dropIn 0.7s cubic-bezier(.22,.68,0,1.2) 0.15s forwards;
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .photo-wrapper img {
            width: 112px;
            height: 112px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--secondary);
            box-shadow:
                0 0 0 6px rgba(232, 235, 242, 0.55),
                0 12px 32px rgba(3, 13, 43, 0.35);
            display: block;
        }

        /* ── Card ── */
        .card {
            background: rgba(232, 235, 242, 0.93);
            backdrop-filter: blur(18px) saturate(1.4);
            -webkit-backdrop-filter: blur(18px) saturate(1.4);
            border-radius: 50px;
            box-shadow:
                0 12px 20px rgba(0, 0, 0, 0.2),
                0 40px 80px rgba(3, 13, 43, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            padding: 72px 40px 40px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            position: relative;
            opacity: 0;
            transform: translateY(36px);
            animation: riseUp 0.65s cubic-bezier(.22,.68,0,1.1) 0.05s forwards;
        }

        @keyframes riseUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Language pills ── */
        .lang-scroll {
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-bottom: 28px;
        }
        .lang-scroll::-webkit-scrollbar { display: none; }

        .lang-track {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lang-btn {
            font-family: Rockwell, 'Rockwell Nova', Georgia, serif;
            font-size: 0.78rem;
            letter-spacing: 0.03em;
            padding: 6px 14px;
            border-radius: 50px;
            border: 1.5px solid rgba(35, 45, 75, 0.28);
            background: transparent;
            color: var(--main);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.22s ease, color 0.22s ease, border-color 0.22s ease, transform 0.15s ease;
        }

        .lang-btn:hover {
            background: rgba(229, 114, 0, 0.1);
            border-color: var(--secondary);
            transform: translateY(-1px);
        }

        .lang-btn.active {
            background: var(--main);
            color: var(--container);
            border-color: var(--main);
        }

        /* ── Divider ── */
        .divider {
            width: 48px;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
            margin: 0 auto 20px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.55s forwards;
        }

        /* ── Title ── */
        .card-title {
            font-size: clamp(1.55rem, 5vw, 2.1rem);
            font-weight: 700;
            line-height: 1.3;
            color: var(--font);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.45s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ── Message ── */
        .message {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--accent3);
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.6s forwards;
        }

        /* ── Contact section ── */
        .contact-section {
            opacity: 0;
            animation: fadeIn 0.5s ease 0.75s forwards;
        }

        .contact-label {
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent3);
            margin-bottom: 14px;
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-family: Rockwell, 'Rockwell Nova', Georgia, serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            filter: brightness(1.06);
        }

        .contact-btn:active {
            transform: translateY(0);
        }

        .btn-email {
            background: var(--main);
            color: var(--container);
        }

        .btn-phone {
            background: var(--secondary);
            color: #fff;
        }

        .btn-label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.72;
            margin-bottom: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body {
                padding: 70px 14px 32px;
            }
            .card {
                padding: 64px 24px 32px;
                border-radius: 36px;
            }
            .photo-wrapper img {
                width: 96px;
                height: 96px;
            }
            .photo-wrapper {
                margin-bottom: -48px;
            }
        }
    </style>
</head>
<body>

    <div class="photo-wrapper">
        <img src="ProfilePic.jpg" alt="Rob Keys" />
    </div>

    <div class="card">
        <div class="lang-scroll">
            <div class="lang-track" id="languageSelector"></div>
        </div>

        <div class="divider"></div>

        <h1 class="card-title" id="title">Thank you for finding my lost bag!</h1>

        <p class="message" id="message">
            I am incredibly grateful that you found my item, and were kind enough to return it.
            Please contact me using the information below so we can arrange its return. (I'll cover any shipping costs)
        </p>

        <div class="contact-section">
            <p class="contact-label" id="contactTitle">Contact Information</p>
            <div class="contact-buttons">
                <a href="mailto:rob_keys@outlook.com" class="contact-btn btn-email">
                    <span class="btn-label">Email</span>
                    rob_keys@outlook.com
                </a>
                <a href="tel:+17033458437" class="contact-btn btn-phone">
                    <span class="btn-label">Phone</span>
                    703-345-8437
                </a>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Found something I lost?",
                message: "I am incredibly grateful that you found my item, and were kind enough to return it. Please contact me using the information below so we can arrange its return. (I'll cover any shipping costs)",
                contactTitle: "Contact Information"
            },
            es: {
                title: "¿Encontraste algo que perdí?",
                message: "Estoy increíblemente agradecido de que hayas encontrado mi artículo y hayas sido tan amable de devolverlo. Por favor contáctame usando la información a continuación para que podamos organizar su devolución. (Cubriré cualquier costo de envío)",
                contactTitle: "Información de Contacto"
            },
            fr: {
                title: "Vous avez trouvé quelque chose que j'ai perdu?",
                message: "Je suis incroyablement reconnaissant que vous ayez trouvé mon objet et ayez été assez gentil pour le retourner. Veuillez me contacter en utilisant les informations ci-dessous afin que nous puissions organiser son retour. (Je couvrirai tous les frais d'expédition)",
                contactTitle: "Coordonnées"
            },
            de: {
                title: "Etwas gefunden, das ich verloren habe?",
                message: "Ich bin unglaublich dankbar, dass Sie meinen Gegenstand gefunden haben und so freundlich waren, ihn zurückzugeben. Bitte kontaktieren Sie mich über die unten stehenden Informationen, damit wir die Rückgabe arrangieren können. (Ich übernehme alle Versandkosten)",
                contactTitle: "Kontaktinformationen"
            },
            zh: {
                title: "找到我丢失的东西了吗？",
                message: "我非常感激您找到了我的物品，并善意地归还它。请使用下方信息与我联系，以便我们安排归还事宜。（我将支付所有运费）",
                contactTitle: "联系方式"
            },
            ja: {
                title: "私が失くした物を見つけましたか？",
                message: "私の物を見つけていただき、そして返却してくださる親切心に心から感謝しています。返却の手配ができるよう、下記の情報でご連絡ください。（送料は私が負担します）",
                contactTitle: "連絡先"
            },
            ar: {
                title: "وجدت شيئاً فقدته؟",
                message: "أنا ممتن للغاية لأنك وجدت غرضي وكنت لطيفاً بما يكفي لإعادته. يرجى الاتصال بي باستخدام المعلومات أدناه حتى نتمكن من ترتيب إعادته. (سأغطي أي تكاليف شحن)",
                contactTitle: "معلومات الاتصال"
            },
            ru: {
                title: "Нашли что-то, что я потерял?",
                message: "Я невероятно благодарен, что вы нашли мою вещь и были достаточно добры, чтобы вернуть её. Пожалуйста, свяжитесь со мной, используя информацию ниже, чтобы мы могли договориться о возврате. (Я покрою все расходы на доставку)",
                contactTitle: "Контактная Информация"
            },
            pt: {
                title: "Encontrou algo que perdi?",
                message: "Estou incrivelmente grato por você ter encontrado meu item e sido gentil o suficiente para devolvê-lo. Por favor, entre em contato comigo usando as informações abaixo para que possamos organizar sua devolução. (Eu cobrirei quaisquer custos de envio)",
                contactTitle: "Informações de Contato"
            },
            it: {
                title: "Hai trovato qualcosa che ho perso?",
                message: "Sono incredibilmente grato che tu abbia trovato il mio oggetto e sia stato così gentile da restituirlo. Per favore contattami usando le informazioni qui sotto così possiamo organizzare la restituzione. (Coprirò tutte le spese di spedizione)",
                contactTitle: "Informazioni di Contatto"
            },
            ko: {
                title: "제가 잃어버린 물건을 찾으셨나요?",
                message: "제 물건을 찾아주시고 돌려주실 만큼 친절하셔서 정말 감사합니다. 아래 정보로 연락주시면 반환을 준비하겠습니다. (배송비는 제가 부담하겠습니다)",
                contactTitle: "연락처 정보"
            },
            hi: {
                title: "मेरी खोई हुई चीज़ मिली?",
                message: "मैं अविश्वसनीय रूप से आभारी हूं कि आपने मेरी वस्तु पाई और इसे वापस करने के लिए पर्याप्त दयालु थे। कृपया नीचे दी गई जानकारी का उपयोग करके मुझसे संपर्क करें ताकि हम इसकी वापसी की व्यवस्था कर सकें। (मैं किसी भी शिपिंग लागत को कवर करूंगा)",
                contactTitle: "संपर्क जानकारी"
            }
        };

        const languages = [
            { code: 'en', name: 'English' },
            { code: 'es', name: 'Español' },
            { code: 'fr', name: 'Français' },
            { code: 'de', name: 'Deutsch' },
            { code: 'zh', name: '中文' },
            { code: 'ja', name: '日本語' },
            { code: 'ar', name: 'العربية' },
            { code: 'ru', name: 'Русский' },
            { code: 'pt', name: 'Português' },
            { code: 'it', name: 'Italiano' },
            { code: 'ko', name: '한국어' },
            { code: 'hi', name: 'हिन्दी' }
        ];

        let currentLang = 'en';

        function createLanguageButtons() {
            const selector = document.getElementById('languageSelector');
            languages.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'lang-btn' + (lang.code === currentLang ? ' active' : '');
                btn.textContent = lang.name;
                btn.onclick = () => changeLanguage(lang.code);
                selector.appendChild(btn);
            });
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            const t = translations[langCode];

            document.getElementById('title').textContent = t.title;
            document.getElementById('message').textContent = t.message;
            document.getElementById('contactTitle').textContent = t.contactTitle;

            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', languages[i].code === langCode);
            });

            document.body.style.direction = langCode === 'ar' ? 'rtl' : 'ltr';
        }

        createLanguageButtons();
    </script>
</body>
</html>
